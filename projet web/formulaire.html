<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Créer votre compte</title>
    <link rel="stylesheet" href="formulaire.css">
</head>
<body>

<div class="background">
    <div class="overlay"></div>

    <div class="form-container">
        <h2>Créez votre compte</h2>

        <form>
            <div class="row">
                <input type="text" placeholder="Nom">
                <input type="text" placeholder="Prénom">
            </div>

            <input type="email" placeholder="Email">

            <div class="row">
                <select>
                    <option>Homme</option>
                    <option>Femme</option>
                </select>
                <input type="tel" placeholder="+216">
                
            </div>

            <div class="row">
                <select>
                    <option>Pays</option>
                </select>
                <input type="text" placeholder="Adresse de livraison ou expédition">
            </div>

            <div class="row">
                <input type="text" placeholder="Code postal">
                <input type="text" placeholder="Ville">
            </div>

            <div class="row">
                <input type="password" placeholder="Mot de passe">
                <input type="password" placeholder="Confirmer mot de passe">
            </div>

            <label class="checkbox">
                <input type="checkbox">
                Oui, je veux recevoir la newsletter : nouveautés et bons plans garantis.
            </label>

            <button type="submit">S'inscrire →</button>

            <p class="login-link">
                Vous avez un compte ? <a href="#">Se connecter</a>
            </p>
        </form>
    </div>
</div>

</body>
</html>
